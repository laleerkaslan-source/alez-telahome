<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödemeye yönlendiriliyorsunuz... | Tela Home</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <p style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#666;">Ödeme sayfasına yönlendiriliyorsunuz...</p>
  <script src="cart.js"></script>
  <script>
    const items = Cart.getItems();
    if (items.length > 0) {
      const cartData = items.map(item => ({
        id: item.id,
        name: item.name,
        price: item.price,
        image: item.image || '',
        size: item.size || '',
        qty: item.qty,
        source: 'alez'
      }));
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cartData))));
      window.location.href = 'https://telahome.store/sepet.html?import=' + encodeURIComponent(encoded);
    } else {
      window.location.href = 'https://telahome.store/sepet.html';
    }
  </script>
</body>
</html>
